server:
  # Hugging Face / Railway / Fly inject the public port via $PORT; default 8080 locally.
  port: ${PORT:8080}
  # Behind Railway/Fly's HTTPS proxy: honor X-Forwarded-* so Swagger builds https URLs.
  forward-headers-strategy: framework

spring:
  application:
    name: payment-auth-switch
  datasource:
    # Local default points at the docker-compose Postgres; override via env in the cloud.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/authswitch}
    username: ${SPRING_DATASOURCE_USERNAME:authswitch}
    password: ${SPRING_DATASOURCE_PASSWORD:authswitch}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; Hibernate only validates it
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

# ISO 8583 TCP server settings (the "switch" interface)
iso:
  server:
    enabled: ${ISO_SERVER_ENABLED:true}
    port: ${ISO_SERVER_PORT:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
