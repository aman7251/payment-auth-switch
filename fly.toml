# Fly.io deployment config. Run `fly launch` (it detects the Dockerfile) then `fly deploy`.
# Set DB secrets first:  fly secrets set SPRING_DATASOURCE_URL=... SPRING_DATASOURCE_USERNAME=... SPRING_DATASOURCE_PASSWORD=...
app = "payment-auth-switch"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  ISO_SERVER_ENABLED = "true"
  ISO_SERVER_PORT = "10000"

# Public HTTP service (REST API + Swagger UI)
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

# Raw TCP service for the ISO 8583 switch (acquirer simulator connects here)
[[services]]
  protocol = "tcp"
  internal_port = 10000

  [[services.ports]]
    port = 10000

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
