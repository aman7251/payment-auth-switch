services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authswitch
      POSTGRES_USER: authswitch
      POSTGRES_PASSWORD: authswitch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authswitch"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/authswitch
      SPRING_DATASOURCE_USERNAME: authswitch
      SPRING_DATASOURCE_PASSWORD: authswitch
      ISO_SERVER_ENABLED: "true"
      ISO_SERVER_PORT: "10000"
    ports:
      - "8080:8080"    # REST + Swagger
      - "10000:10000"  # ISO 8583 TCP switch
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
